<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DRACO — Cinematic Luxury Landing Page</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Top nav bar -->
    <nav class="nav-bar">
        <span class="nav-wordmark">Draco — BREAK YOUR LIMITS</span>
        <span class="nav-status">Launching Soon</span>
    </nav>

    <!-- Main page -->
    <main class="page" id="page">

        <!-- Logo Section -->
        <div class="logo-wrap" id="logoWrap">
            <div class="logo-ring"></div>
            <div class="logo-tick"></div>
            <img class="logo-img" src="assets/logo.png" alt="DRACO Dragon Logo" width="160" height="auto" draggable="false"/>
        </div>

        <!-- Brand name -->
        <h1 class="brand-name" id="brandName">DRACO</h1>

        <!-- Subtitle -->
        <p class="subtitle">Dropping Soon</p>

        <!-- Ornamental rule -->
        <div class="rule">
            <div class="rule-diamond"></div>
        </div>

        <!-- Countdown -->
        <div class="countdown">
            <div class="count-unit">
                <div class="count-num-wrap"><span class="count-number" id="cnt-days">00</span></div>
                <span class="count-label">Days</span>
            </div>
            <span class="count-sep">:</span>
            <div class="count-unit">
                <div class="count-num-wrap"><span class="count-number" id="cnt-hours">00</span></div>
                <span class="count-label">Hours</span>
            </div>
            <span class="count-sep">:</span>
            <div class="count-unit">
                <div class="count-num-wrap"><span class="count-number" id="cnt-min">00</span></div>
                <span class="count-label">Mins</span>
            </div>
            <span class="count-sep">:</span>
            <div class="count-unit">
                <div class="count-num-wrap"><span class="count-number" id="cnt-sec">00</span></div>
                <span class="count-label">Secs</span>
            </div>
        </div>

        <!-- Notify section -->
        <div class="notify-wrap">
            <p class="notify-label">Gain early access</p>
            <div class="notify-form" id="notifyForm">
                <input type="email" class="notify-input" id="emailInput" placeholder="your@email.com" autocomplete="email" spellcheck="false"/>
                <button class="notify-btn" id="notifyBtn" onclick="handleNotify()">Notify Me</button>
            </div>
            <p class="notify-success" id="notifySuccess">
                You're on the list — <span>the throne awaits.</span>
            </p>
        </div>

        <!-- Vertical separator -->
        <div class="sep-line"></div>

        <!-- Social icons -->
        <div class="socials">
            <a href="#" class="social-link" aria-label="Facebook">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
                </svg>
            </a>
            <a href="https://www.instagram.com/dracowear._/" class="social-link" aria-label="Instagram">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5"/>
                    <circle cx="12" cy="12" r="4.5"/>
                    <circle cx="17.5" cy="6.5" r="0.6" fill="currentColor" stroke="none"/>
                </svg>
            </a>
            <a href="#" class="social-link" aria-label="TikTok">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5" />
                </svg>
            </a>
        </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <span class="footer-text">© 2026 DRACO</span>
        <div class="footer-dot"></div>
        <span class="footer-text">FOR THOSE WHO MOVE DIFFERENTLY AND NEVER EXPLAIN WHY</span>
        <div class="footer-dot"></div>
        <span class="footer-text">All Rights Reserved</span>
    </footer>

    <!-- External JavaScript -->
    <script src="script.js"></script>
</body>
</html>
